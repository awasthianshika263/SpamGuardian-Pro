<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SpamGuardian Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="container py-4">

  <!-- HEADER -->
  <div class="site-header">
    <button class="theme-btn" id="themeBtn">
      <i class="bi bi-sun-fill me-1"></i> Light Mode
    </button>
    <div class="header-logo">
      <div class="logo-shield"><i class="bi bi-shield-lock-fill"></i></div>
      <h1 class="header-title">Spam<span>Guardian</span> Pro</h1>
    </div>
    <p class="header-sub"><i class="bi bi-cpu me-1"></i>AI-Powered Email Threat Detection</p>
    <div class="header-badges">
      <div class="live-badge"><div class="live-dot"></div> LIVE MONITORING</div>
      <div class="privacy-badge"><i class="bi bi-lock-fill me-1"></i> 100% Local Processing</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid mb-4">
    <div class="stat-card">
      <div class="stat-icon total"><i class="bi bi-envelope-fill"></i></div>
      <div>
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-lbl">Scanned</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon spam"><i class="bi bi-exclamation-triangle-fill"></i></div>
      <div>
        <div class="stat-num" id="statSpam">0</div>
        <div class="stat-lbl">Spam</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon safe"><i class="bi bi-check-circle-fill"></i></div>
      <div>
        <div class="stat-num" id="statSafe">0</div>
        <div class="stat-lbl">Safe</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon rate"><i class="bi bi-graph-up-arrow"></i></div>
      <div>
        <div class="stat-num" id="statRate">0%</div>
        <div class="stat-lbl">Spam Rate</div>
      </div>
    </div>
  </div>

  <!-- MAIN ROW -->
  <div class="row g-4 mb-4">
    <div class="col-lg-5">
      <div class="panel">
        <div class="panel-title"><i class="bi bi-terminal-fill"></i> Analyze Message</div>
        <textarea class="txt-input" id="txt" rows="6"
          placeholder="Paste any email subject, body or message here...&#10;&#10;Tip: Ctrl+Enter to analyze"></textarea>
        <button class="btn-analyze" id="checkBtn">
          <i class="bi bi-shield-check"></i> Analyze for Spam
        </button>
        <div class="result-box" id="resultBox">
          <div class="result-top">
            <span id="resultIcon" style="font-size:1.2rem"></span>
            <span class="result-label" id="resultLabelEl"></span>
            <span class="result-pct" id="resultPct"></span>
          </div>
          <div class="prob-track">
            <div class="prob-fill" id="probFill"></div>
          </div>
          <div class="result-preview" id="resultPreview"></div>
          <button class="btn-flag" id="btnWrong">
            <i class="bi bi-flag me-1"></i>Wrong? Report it
          </button>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="panel">
        <div class="alerts-top">
          <div class="panel-title" style="margin:0"><i class="bi bi-bell-fill"></i> Live Gmail Alerts</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="alert-count" id="countBadge">0</span>
            <button class="btn-csv" id="exportBtn"><i class="bi bi-download me-1"></i>Export CSV</button>
          </div>
        </div>
        <div style="margin-top:16px">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon"><i class="bi bi-inbox"></i></div>
            <div style="font-weight:600;margin-bottom:4px">No alerts yet</div>
            <div style="font-size:0.78rem">Waiting for new emails...</div>
          </div>
          <div class="scroll-box" id="notifArea"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel history-panel">
    <div class="section-label"><i class="bi bi-clock-history"></i> Email History</div>
    <div class="hist-toolbar">
      <div class="search-wrap">
        <i class="bi bi-search"></i>
        <input type="text" class="search-input" id="searchBox" placeholder="Search subject or sender...">
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="spam">Spam Only</button>
      <button class="filter-btn" data-filter="safe">Safe Only</button>
    </div>
    <div style="overflow-x:auto">
      <table class="hist-table">
        <thead>
          <tr><th>Time</th><th>From</th><th>Subject</th><th>Result</th><th>Confidence</th></tr>
        </thead>
        <tbody id="histBody">
          <tr><td colspan="5" style="text-align:center;padding:28px;color:var(--text2)">No email history yet</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
